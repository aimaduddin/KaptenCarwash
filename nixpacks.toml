[phases.setup]
nixPkgs = ["nodejs_20", "php", "php82Packages.composer", "git"]

[phases.build]
nixPkgs = ["nodejs_20", "php", "php82Packages.composer"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader", "npm ci", "npm run build"]

[phases.start]
cmd = "php artisan serve --host=0.0.0.0 --port=8000"
